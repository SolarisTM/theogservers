<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server List - The OG Servers</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/images/icons/ogs.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/images/icons/ogs.png">

    <link rel="stylesheet" href="https://unpkg.com/xp.css">
    <style>
        /* --- ESTILO DESKTOP --- */
        html {
            scroll-behavior: smooth;
        }

        body {
            background: #0078D7 url('https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/images/bliss-windows-xp.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0; padding: 20px;
            font-family: "Tahoma", sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .main-window {
            width: 1800px; 
            max-width: 98%;
            margin-top: 5px;
        }

        .title-bar-text::before {
            content: "";
            display: inline-block;
            width: 16px;
            height: 16px;
            vertical-align: middle;
            margin-right: 6px;
            background: url('https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/images/icons/ogs.png') no-repeat center center;
            background-size: contain;
        }

        .window-body {
            margin: 0 !important;
            padding: 0 !important;
            background-color: #191919 !important;
        }

        .window-content-area {
            background-color: #191919;
            color: #ffffff;
            width: 100%;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            padding: 25px 20px 15px 20px;
            background: #191919;
            justify-content: center;
            border-bottom: 1px solid #252525;
        }

        .nav-link {
            text-decoration: none;
            color: inherit;
        }

        .action-buttons button {
            min-width: 150px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }

        .action-buttons button img {
            width: 24px;
            height: 24px;
        }

        .welcome-section {
            text-align: center;
            padding: 25px;
            margin: 20px auto 10px auto;
            background: #202020;
            border: 1px solid #333;
            max-width: 800px;
        }

        .gif-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .welcome-gif {
            display: block;
            max-width: 400px;
        }

        .arrow-gif {
            width: 50px;
            height: auto;
        }

        .welcome-section h2 {
            margin: 0;
            color: #ffbd69;
            font-size: 24px;
        }

        /* Área para a futura lista de servidores */
        .server-list-container {
            padding: 30px 60px;
            background: #191919;
            min-height: 300px;
        }

        .site-footer {
            padding: 15px;
            text-align: center;
            color: #666;
            font-size: 11px;
            background: #191919;
            border-top: 1px solid #252525;
        }

        .taskbar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 30px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #191919 100%);
            border-top: 1px solid #0831d9;
            display: flex; align-items: center; padding: 0 10px;
            z-index: 1000;
        }

        .start-btn {
            background: linear-gradient(to bottom, #388e3c 0%, #4caf50 50%, #388e3c 100%);
            color: white; font-weight: bold; font-style: italic;
            border: none; padding: 2px 15px; border-radius: 0 10px 10px 0;
            cursor: pointer;
            box-shadow: inset 1px 1px 1px #fff;
        }

        @media (max-width: 768px) {
            body { padding: 5px; padding-bottom: 40px; }
            .action-buttons { flex-wrap: wrap; gap: 8px; padding: 15px 10px; }
            .action-buttons .nav-link, .action-buttons button { min-width: calc(50% - 10px); flex-grow: 1; }
            .welcome-section { padding: 15px; margin: 10px; }
            .welcome-gif { max-width: 70%; }
            .arrow-gif { width: 30px; }
            .server-list-container { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="window main-window">
        <div class="title-bar">
            <div class="title-bar-text">The OG Servers - Server List</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            
            <div class="window-content-area">
                <div class="action-buttons">
                    <a href="../index.html" class="nav-link">
                        <button class="nav-element">
                            <img src="https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/images/icons/IE%20Home.png" alt="Home">
                            Home
                        </button>
                    </a>

                    <a href="../index.html#games" class="nav-link">
                        <button class="nav-element">
                            <img src="https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/images/icons/Game%20Controller.png" alt="Games">
                            Games
                        </button>
                    </a>

                    <button class="nav-element" style="background: #e1e1e1; color: #000;">
                        <img src="https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/images/icons/Manage%20Your%20Server.png" alt="Servers">
                        Servers
                    </button>
                    <button class="nav-element">
                        <img src="https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/images/icons/Network%20Connections.png" alt="Status">
                        Status
                    </button>
                    <button class="nav-element">
                        <img src="https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/images/icons/Windows%20Messenger.png" alt="Community">
                        Community
                    </button>
                    <button class="nav-element" style="background: #ffbd69; font-weight: bold; color: #000;">
                        <img src="https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/images/icons/Remote%20Assistance.png" alt="Donations">
                        Donations
                    </button>
                </div>

                <div class="welcome-section">
                    <div class="gif-container">
                        <img src="https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/images/gifs/arrow-left.gif" alt="Seta Esquerda" class="arrow-gif">
                        <img src="https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/images/gifs/couch2.gif" alt="Welcome" class="welcome-gif">
                        <img src="https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/images/gifs/arrow-right.gif" alt="Seta Direita" class="arrow-gif">
                    </div>
                    <h2>The OG Servers List</h2>
                </div>

                <div class="server-list-container">
                    <p style="text-align: center; color: #888;">[Server List coming soon...]</p>
                </div>

                <div class="site-footer">
                    © 2026 The OG Servers. All Rights Reserved.
                </div>
            </div>
        </div>
    </div>

    <footer class="taskbar">
        <button class="start-btn nav-element">Start</button>
        <div style="margin-left: 10px; color: white; font-size: 11px;">theogservers.com/servers</div>
        <div style="margin-left: auto; color: white; font-size: 11px;" id="clock"></div>
    </footer>

    <script>
        const clickSound = new Audio('https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/sounds/windows-xp/Windows%20Navigation%20Start.mp3');
        const hoverSound = new Audio('https://raw.githubusercontent.com/SolarisTM/TheOGServers/refs/heads/main/sounds/windows-xp/Windows%20XP%20Balloon.mp3');

        const interactiveElements = document.querySelectorAll('.nav-element, button');

        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => {
                hoverSound.currentTime = 0;
                hoverSound.play().catch(e => console.log("Interação necessária"));
            });

            el.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    clickSound.currentTime = 0;
                    clickSound.play().catch(e => console.log("Erro no som"));
                }
            });
        });

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
