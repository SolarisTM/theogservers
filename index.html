<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>The OG Servers - Classic Multiplayer</title>
    <link rel="stylesheet" href="https://unpkg.com/xp.css">
    <style>
        body {
            background: #0078D7 url('https://upload.wikimedia.org/wikipedia/commons/7/7d/Bliss_%28Windows_XP%29.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0; padding: 20px;
            font-family: "Tahoma", sans-serif;
            overflow: hidden; /* Para parecer um desktop fixo */
        }

        /* Área de Ícones (Desktop) */
        .desktop-area {
            display: grid;
            grid-template-columns: repeat(auto-fill, 80px);
            grid-auto-rows: 90px;
            gap: 20px;
            height: calc(100vh - 60px);
        }

        .icon {
            width: 75px;
            text-align: center;
            cursor: pointer;
            color: white;
            text-shadow: 1px 1px 2px black;
            font-size: 11px;
        }

        .icon img {
            width: 32px; height: 32px;
            display: block; margin: 0 auto 5px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        .icon:hover img { filter: brightness(1.2); }

        /* Janela Principal Centralizada */
        .main-window {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            max-height: 80vh;
            display: flex; flex-direction: column;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
            overflow-y: auto;
            max-height: 400px;
        }

        .game-item {
            background: white;
            border: 1px solid #7f9db9;
            padding: 5px;
            text-align: center;
            cursor: pointer;
        }

        .game-item:hover { background: #ffbd69; }

        .game-item img { width: 100%; height: 80px; object-fit: cover; }

        /* Barra de Tarefas */
        .taskbar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 30px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #191919 100%);
            display: flex; align-items: center; padding: 0 10px;
            border-top: 1px solid #0831d9;
        }

        .start-btn {
            background: linear-gradient(to bottom, #388e3c 0%, #4caf50 50%, #388e3c 100%);
            color: white; font-weight: bold; font-style: italic;
            border: none; padding: 2px 15px; border-radius: 0 10px 10px 0;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="desktop-area">
    <div class="icon" onclick="window.open('https://archive.org/details/@rizentm')">
        <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png">
        <span>Minha Archive</span>
    </div>
    <div class="icon" onclick="alert('Conectando ao Discord...')">
        <img src="https://win98icons.alexmeub.com/icons/png/msagent-3.png">
        <span>Discord</span>
    </div>
</div>

<div class="window main-window">
    <div class="title-bar">
        <div class="title-bar-text">The OG Servers - Localizado em Uberlândia, MG</div>
        <div class="title-bar-controls">
            <button aria-label="Minimize"></button>
            <button aria-label="Maximize"></button>
            <button aria-label="Close"></button>
        </div>
    </div>
    <div class="window-body">
        <menu role="tablist">
            <li role="tab" class="active"><a href="#">Servidores Ativos</a></li>
            <li role="tab"><a href="#">Como Jogar</a></li>
        </menu>

        <div class="game-grid">
            <div class="game-item hl-sound">
                <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/7940/header.jpg">
                <strong>Call of Duty 4</strong>
            </div>
            <div class="game-item hl-sound">
                <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2820/header.jpg">
                <strong>Quake III</strong>
            </div>
            <div class="game-item hl-sound">
                <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/24860/header.jpg">
                <strong>Battlefield 2</strong>
            </div>
        </div>

        <div class="status-bar">
            <p class="status-bar-field">Status: Sistema Pronto</p>
            <p class="status-bar-field">Ping: 15ms</p>
        </div>
    </div>
</div>

<footer class="taskbar">
    <button class="start-btn">Iniciar</button>
    <div style="margin-left:10px; color:white; font-size:11px;">The OG Servers</div>
    <div style="margin-left:auto; color:white; font-size:11px;" id="clock"></div>
</footer>

<script>
    // Som do Half-Life ao passar o mouse
    const sound = new Audio('https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Half-Life+Select+Sound&filename=mt/MTY4NTI2NDMxNjg1Mjcy_p_2fGz_2biW9_2fM.mp3');
    document.querySelectorAll('.hl-sound').forEach(el => {
        el.addEventListener('mouseenter', () => { sound.currentTime = 0; sound.play(); });
    });

    // Relógio
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
</script>

</body>
</html>
