<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The OG Servers - Classic Multiplayer Revival</title>
    <link rel="stylesheet" href="https://unpkg.com/xp.css">
    <style>
        body {
            background: #0078D7 url('https://upload.wikimedia.org/wikipedia/commons/7/7d/Bliss_%28Windows_XP%29.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0; padding: 20px;
            font-family: "Tahoma", sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .main-window {
            width: 1300px; 
            max-width: 98%;
            margin-top: 10px;
        }

        .window-body {
            margin: 0 !important;
            padding: 0 !important;
            background-color: #191919 !important;
        }

        .window-content-area {
            background-color: #191919;
            color: #ffffff;
            width: 100%;
        }

        /* Navigation Menu */
        .action-buttons {
            display: flex;
            gap: 10px;
            padding: 15px 20px 5px 20px;
            background: #191919;
            justify-content: center;
        }

        .action-buttons button {
            min-width: 120px;
            height: 28px;
        }

        /* Address Bar (Simulating IE/OldServers) */
        .address-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 20px 15px 20px;
            background: #191919;
            border-bottom: 1px solid #333;
        }

        .address-label {
            color: #888;
            font-size: 11px;
        }

        .address-input-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            background: #252525;
            border: 1px solid #444;
            padding: 3px 10px;
            height: 22px;
        }

        .address-input-container img {
            width: 14px;
            height: 14px;
            margin-right: 8px;
        }

        .address-text {
            color: #ddd;
            font-size: 12px;
        }

        /* Game Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 25px;
            background: #191919;
            max-height: 650px;
            overflow-y: auto;
        }

        /* Custom Scrollbar Dark */
        .game-grid::-webkit-scrollbar { width: 12px; }
        .game-grid::-webkit-scrollbar-track { background: #191919; }
        .game-grid::-webkit-scrollbar-thumb { background: #333; border: 2px solid #191919; }

        .game-card {
            position: relative;
            border: 1px solid #444;
            overflow: hidden;
            cursor: pointer;
            height: 180px;
            transition: transform 0.1s, border-color 0.2s;
        }

        .game-card:hover {
            transform: scale(1.02);
            border-color: #ff8e00;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8);
        }

        .game-title {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 12px;
            color: white;
            font-weight: bold;
            text-align: center;
            font-size: 13px;
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
        }

        .status-bar {
            background: #191919 !important;
            border-top: 1px solid #333 !important;
            color: #888 !important;
            box-shadow: none !important;
            margin: 0 !important;
        }

        .status-bar-field {
            border-right: 1px solid #333 !important;
            box-shadow: none !important;
        }

        .taskbar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 30px;
            background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #191919 100%);
            border-top: 1px solid #0831d9;
            display: flex; align-items: center; padding: 0 10px;
            z-index: 1000;
        }

        .start-btn {
            background: linear-gradient(to bottom, #388e3c 0%, #4caf50 50%, #388e3c 100%);
            color: white; font-weight: bold; font-style: italic;
            border: none; padding: 2px 15px; border-radius: 0 10px 10px 0;
            cursor: pointer;
            box-shadow: inset 1px 1px 1px #fff;
        }
    </style>
</head>
<body>

    <div class="window main-window">
        <div class="title-bar">
            <div class="title-bar-text">The OG Servers - Classic Multiplayer Revival</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            
            <div class="window-content-area">
                <div class="action-buttons">
                    <button class="hl-sound">Home</button>
                    <button class="hl-sound">Games</button>
                    <button class="hl-sound">Servers</button>
                    <button class="hl-sound">Status</button>
                    <button class="hl-sound" style="background: #ffbd69; font-weight: bold;">Community</button>
                </div>

                <div class="address-bar">
                    <span class="address-label">Address</span>
                    <div class="address-input-container">
                        <img src="https://win98icons.alexmeub.com/icons/png/world-0.png" alt="icon">
                        <span class="address-text">https://theogservers.com/games</span>
                    </div>
                </div>

                <div class="game-grid">
                    <div class="game-card hl-sound">
                        <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/24860/header.jpg">
                        <div class="game-title">Battlefield 2</div>
                    </div>
                    <div class="game-card hl-sound">
                        <img src="https://image.api.playstation.com/vulcan/ap/rnd/202306/2015/a12361d763784a9e525143a5023a633d.png">
                        <div class="game-title">Call of Duty 4</div>
                    </div>
                    <div class="game-card hl-sound">
                        <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/4000/header.jpg">
                        <div class="game-title">Garry's Mod</div>
                    </div>
                    <div class="game-card hl-sound">
                        <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/320/header.jpg">
                        <div class="game-title">Half-Life 2: DM</div>
                    </div>
                    <div class="game-card hl-sound">
                        <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1250/header.jpg">
                        <div class="game-title">Killing Floor</div>
                    </div>
                    <div class="game-card hl-sound">
                        <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2820/header.jpg">
                        <div class="game-title">Quake III Arena</div>
                    </div>
                    <div class="game-card hl-sound">
                        <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/41070/header.jpg">
                        <div class="game-title">Serious Sam: TFE</div>
                    </div>
                    <div class="game-card hl-sound">
                        <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/41074/header.jpg">
                        <div class="game-title">Serious Sam: TSE</div>
                    </div>
                </div>
            </div>

            <div class="status-bar">
                <p class="status-bar-field">Browsing: Games</p>
                <p class="status-bar-field">Status: System Online</p>
                <p class="status-bar-field">v1.6</p>
            </div>
        </div>
    </div>

    <footer class="taskbar">
        <button class="start-btn">Start</button>
        <div style="margin-left: 10px; color: white; font-size: 11px;">theogservers.com</div>
        <div style="margin-left: auto; color: white; font-size: 11px;" id="clock"></div>
    </footer>

    <script>
        const hlClick = new Audio('https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Half-Life+Select+Sound&filename=mt/MTY4NTI2NDMxNjg1Mjcy_p_2fGz_2biW9_2fM.mp3');
        document.querySelectorAll('.hl-sound').forEach(el => {
            el.addEventListener('mouseenter', () => {
                hlClick.currentTime = 0;
                hlClick.play().catch(() => {}); 
            });
        });
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
